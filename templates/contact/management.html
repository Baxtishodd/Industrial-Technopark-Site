{% extends 'core/base.html' %}
{% load static i18n %}

{% block content %}

<!-- Header -->
<div class="container-fluid bg-header py-5 location-header">
    <div class="row py-5">
        <div class="col-12 pt-lg-1  text-center">
             <h1 class="display-4 text-white animated zoomIn">
                 {% trans "Management" %}
             </h1>
        </div>
    </div>
</div>

<div class="container py-5">
<!--    <div class="section-title text-center position-relative pb-3 mb-5 mx-auto">-->
<!--        <h5 class="fw-bold text-primary text-uppercase">{% trans "Our Team" %}</h5>-->
<!--        <h1 class="mb-0">{% trans "Management Team" %}</h1>-->
<!--    </div>-->

    <div class="row g-4">
        {% for m in managements %}
        <div class="col-lg-4 col-md-6">

            <div class="bg-white rounded shadow overflow-hidden">

                <!-- IMAGE -->
                <div>
                    {% if m.avatar %}
                    <img src="{{ m.avatar.url }}" class="img-fluid w-100"
                         style="height:450px; object-fit:cover;">
                    {% endif %}
                </div>

                <!-- INFO -->
                <div class="p-4">

                    <h5 class="fw-bold text-primary mb-1">
                        {{ m.get_fullname }}
                    </h5>

                    <p class="mb-3 text-muted">
                        {{ m.get_position }}
                    </p>

                    <!-- CONTACT -->
                    <div class="d-flex align-items-center mb-2">
                        <i class="fa fa-phone text-primary me-2"></i>
                        <small>{{ m.phone }}</small>
                    </div>

                    <div class="d-flex align-items-center">
                        <i class="fa fa-envelope text-primary me-2"></i>
                        <small>{{ m.email }}</small>
                    </div>

                </div>

            </div>

        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
