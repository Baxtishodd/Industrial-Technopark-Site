{% extends 'core/base.html' %}
{% load i18n %}

{% block content %}

<!-- Header -->
<div class="container-fluid bg-header py-5 location-header">
    <div class="row py-5">
        <div class="col-12 pt-lg-5 mt-lg-5 text-center">
            <h1 class="display-4 text-white animated zoomIn">{% trans "Feedback" %}</h1>
            <p class="text-white mb-0">{% trans "Send us your inquiry" %}</p>
        </div>
    </div>
</div>

<!-- Form -->
<div class="container py-5">
    <div class="row justify-content-center">
        {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="col-lg-8">

            <form method="POST">
                {% csrf_token %}

                <div class="row g-3">

                    <div class="col-12">
                        <input name="name" type="text" required
                               class="form-control bg-light border-0"
                               placeholder='{% trans "Company / Your Name" %}'
                               style="height: 55px;">
                    </div>

                    <div class="col-12">
                        <input name="email" type="email"
                               class="form-control bg-light border-0"
                               placeholder='{% trans "Email Address" %}'
                               style="height: 55px;">
                    </div>

                    <div class="col-12">
                        <input name="phone" type="text"
                               class="form-control bg-light border-0"
                               placeholder='{% trans "Phone number" %}'
                               style="height: 55px;">
                    </div>

                    <div class="col-12">
                        <textarea name="message" required
                                  class="form-control bg-light border-0"
                                  rows="4"
                                  placeholder='{% trans "Tell us about your project" %}'></textarea>
                    </div>

                    <div class="col-12">
                        <button class="btn btn-dark w-100 py-3" type="submit">
                            {% trans "Send Inquiry" %}
                        </button>
                    </div>

                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
